<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash Monitor Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent-color: #3b82f6;
            --danger-color: #ef4444;
            --success-color: #10b981;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.05) 0%, transparent 40%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .admin-container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 20px;
        }

        header h1 {
            font-size: 1.6rem;
            font-weight: 800;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 24px;
        }

        .admin-section {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 24px;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        .section-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .section-header i {
            margin-right: 12px;
            color: var(--accent-color);
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 0.85rem;
            color: var(--text-secondary);
            margin-bottom: 6px;
        }

        input, select {
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 12px 14px;
            color: var(--text-primary);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }

        /* FIX: Visibility for select options */
        select option {
            background-color: #1a1a1a;
            color: #ffffff;
            padding: 10px;
        }

        input:focus, select:focus {
            border-color: var(--accent-color);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            gap: 8px;
            transition: all 0.2s;
        }

        .btn-sm {
            padding: 8px 14px;
            font-size: 0.8rem;
        }

        .btn-primary { background: var(--accent-color); color: white; }
        .btn-primary:hover { opacity: 0.9; }
        .btn-danger { background: var(--danger-color); color: white; }
        .btn-secondary { background: rgba(255, 255, 255, 0.1); color: var(--text-primary); }
        .btn-secondary:hover { background: rgba(255, 255, 255, 0.15); }

        .status-badge {
            padding: 5px 12px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-up { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .status-down { background: rgba(239, 68, 68, 0.2); color: #ef4444; }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .alarm-active {
            animation: blink 1s infinite;
            border: 2px solid var(--danger-color) !important;
            background: rgba(239,68,68,0.2) !important;
        }

        .sn-actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .sn-btn {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            background: rgba(255,255,255,0.05);
            border: 1px solid var(--glass-border);
            color: white;
            font-size: 0.85rem;
            font-weight: 600;
            text-align: center;
            transition: all 0.2s;
        }
        .sn-btn:hover { background: rgba(255,255,255,0.1); }

        .table-container { overflow-x: auto; margin-top: 10px; }
        table { width: 100%; border-collapse: collapse; min-width: 600px; }
        th { text-align: left; font-size: 0.8rem; color: var(--text-secondary); padding: 12px; border-bottom: 1px solid var(--glass-border); }
        td { padding: 12px; font-size: 0.85rem; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }

        .radio-group {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255,255,255,0.03);
            padding: 14px;
            border-radius: 12px;
            cursor: pointer;
            margin-bottom: 10px;
            border: 1px solid transparent;
            transition: all 0.2s;
        }
        .radio-group:hover { background: rgba(255, 255, 255, 0.05); }
        .radio-group.active { border-color: var(--accent-color); background: rgba(59, 130, 246, 0.1); }
        .radio-group input { cursor: pointer; }

        #log-add-form {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr auto;
            gap: 12px;
            align-items: end;
            margin-bottom: 20px;
            padding: 16px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 12px;
        }

        .settings-card {
            background: rgba(255,255,255,0.02);
            padding: 20px;
            border-radius: 16px;
            border: 1px solid var(--glass-border);
            height: 100%;
        }

        .settings-card-title {
            color: var(--accent-color);
            font-weight: 700;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        @media (max-width: 767px) {
            header { flex-direction: column; text-align: center; gap: 15px; }
            .btn { width: 100%; }
            #log-add-form { grid-template-columns: 1fr; }
            .admin-container { padding: 20px; }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <header>
            <div>
                <h1>СВІТЛО⚡️ БЕЗПЕКА</h1>
                <div class="version-badge">
                    <span class="label">v</span>
                    <span class="value" id="header-version">...</span>
                </div>
            </div>
            <button class="btn btn-secondary" onclick="fetchData()" style="width: auto;">
                <i class="fas fa-sync-alt"></i> Оновити
            </button>
        </header>

        <div class="admin-grid">
            <!-- System Status -->
            <div class="admin-section">
                <div class="section-header"><i class="fas fa-server"></i> Статус системи</div>
                <div class="form-group">
                    <label>Поточний стан</label>
                    <span id="sys-status" class="status-badge">...</span>
                </div>
                <div class="form-group">
                    <label>Останній сигнал</label>
                    <div id="sys-last-seen" style="font-weight: 600;">-</div>
                </div>
                <div class="form-group">
                    <label>Режим сповіщень</label>
                    <div id="sys-quiet-status" style="font-weight: 800; font-size: 0.95rem;">-</div>
                </div>

                <div id="sn-status-group" style="display: none; margin-top: 15px; padding: 15px; border-radius: 12px;" class="alarm-active">
                    <label style="color: var(--danger-color); font-weight: 800;">ВТРАТА ПУША! 🚨</label>
                    <div class="sn-actions">
                        <button class="sn-btn" onclick="safetyNetReact('down')" style="border-color: var(--danger-color);">Зникло</button>
                        <button class="sn-btn" onclick="safetyNetReact('tech')" style="border-color: var(--accent-color);">Збій</button>
                        <button class="sn-btn" onclick="safetyNetReact('dontknow')">Не знаю</button>
                    </div>
                </div>

                <div id="mute-status-group" style="display: none; margin-top: 15px; padding: 10px; background: rgba(255,255,255,0.03); border-radius: 8px;">
                    <label style="margin-bottom: 2px;">Пауза до</label>
                    <div id="sys-mute-until" style="color: var(--accent-color); font-weight: 800; font-size: 1.1rem;">-</div>
                </div>

                <div style="margin-top: 25px; display: flex; gap: 10px; flex-wrap: wrap;">
                    <button class="btn btn-danger btn-sm" onclick="restartServices()"><i class="fas fa-power-off"></i> Рестарт</button>
                    <button id="btn-unmute" class="btn btn-secondary btn-sm" onclick="unmuteMonitor()" style="display: none;"><i class="fas fa-volume-up"></i> Скасувати паузу</button>
                </div>
            </div>

            <!-- Quiet Mode -->
            <div class="admin-section">
                <div class="section-header"><i class="fas fa-volume-mute"></i> Режим спокою</div>
                <label class="radio-group" id="q-auto">
                    <input type="radio" name="quiet_mode" value="auto"> 
                    <div>
                        <div style="font-weight: 600;">Автоматично</div>
                        <div style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px;">Тиша, якщо немає планових вимкнень</div>
                    </div>
                </label>
                <label class="radio-group" id="q-on">
                    <input type="radio" name="quiet_mode" value="forced_on"> 
                    <div>
                        <div style="font-weight: 600;">Завжди ТИХО</div>
                        <div style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px;">Система завжди мовчить (без сповіщень)</div>
                    </div>
                </label>
                <label class="radio-group" id="q-off">
                    <input type="radio" name="quiet_mode" value="forced_off"> 
                    <div>
                        <div style="font-weight: 600;">Завжди АКТИВНО</div>
                        <div style="font-size: 0.75rem; color: var(--text-secondary); margin-top: 2px;">Звичайні сповіщення за будь-яких умов</div>
                    </div>
                </label>
                <button class="btn btn-primary" onclick="saveQuietMode()" style="width: 100%; margin-top: 10px;">Зберегти зміни</button>
            </div>

            <!-- Unified System Settings -->
            <div class="admin-section full-width">
                <div class="section-header"><i class="fas fa-microchip"></i> Системні налаштування</div>
                
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px;">
                    
                    <!-- Monitoring & Network -->
                    <div class="settings-card">
                        <div class="settings-card-title"><i class="fas fa-broadcast-tower"></i> Моніторинг</div>
                        <div class="form-group"><label>Регіон (ID)</label><input type="text" id="cfg-region"></div>
                        <div class="form-group"><label>Групи (через кому)</label><input type="text" id="cfg-groups"></div>
                        <div class="form-group"><label>Chat ID Адміна</label><input type="text" id="cfg-admin-chat"></div>
                        <div class="form-group"><label>Пуш інтервал (сек)</label><input type="number" id="cfg-push-interval"></div>
                        <div class="form-group"><label>SN Timeout (сек)</label><input type="number" id="cfg-sn-timeout"></div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                            <div class="form-group"><label>Мін. інт. (сек)</label><input type="number" id="adv-push-min"></div>
                            <div class="form-group"><label>Макс. інт. (сек)</label><input type="number" id="adv-push-max"></div>
                        </div>
                        <div class="form-group"><label>Затримка SN (сек)</label><input type="number" id="adv-sn-delay"></div>
                    </div>

                    <!-- Quiet Mode & Sources -->
                    <div class="settings-card">
                        <div class="settings-card-title"><i class="fas fa-database"></i> Робота з даними</div>
                        <div class="form-group"><label>Поріг стабільності (год)</label><input type="number" id="adv-quiet-threshold"></div>
                        <div class="form-group">
                            <label>Авто-підтвердження Quiet Mode</label>
                            <select id="adv-quiet-auto">
                                <option value="true">Увімкнено (авто-вхід)</option>
                                <option value="false">Вимкнено (чекати адміна)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Пріоритет джерела</label>
                            <select id="adv-ds-priority">
                                <option value="yasno">Yasno (Пріоритет)</option>
                                <option value="github">ДТЕК / GitHub (Пріоритет)</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Smart Deduplication</label>
                            <select id="adv-ds-dedup">
                                <option value="true">Увімкнено</option>
                                <option value="false">Вимкнено</option>
                            </select>
                        </div>
                        <div class="form-group"><label>Година роловеру (0-23)</label><input type="number" id="adv-ds-rollover"></div>
                    </div>

                    <!-- Geo & AQI -->
                    <div class="settings-card">
                        <div class="settings-card-title"><i class="fas fa-map-marker-alt"></i> Геопозиція та AQI</div>
                        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                            <div class="form-group"><label>Широта (Lat)</label><input type="text" id="cfg-lat"></div>
                            <div class="form-group"><label>Довгота (Lon)</label><input type="text" id="cfg-lon"></div>
                        </div>
                        <div class="form-group"><label>ID станції SaveEcoBot</label><input type="text" id="cfg-aq-station"></div>
                        <div class="form-group"><label>Назва локації для дашборду</label><input type="text" id="cfg-aq-name"></div>
                        
                        <div style="margin-top: 15px; border-top: 1px solid var(--glass-border); padding-top: 15px;">
                            <label style="color: var(--accent-color); font-weight: 600; margin-bottom: 10px; display: block;">Відображення</label>
                            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
                                <div class="form-group"><label>Повітря</label><select id="adv-db-aq"><option value="true">Так</option><option value="false">Ні</option></select></div>
                                <div class="form-group"><label>Радіація</label><select id="adv-db-rad"><option value="true">Так</option><option value="false">Ні</option></select></div>
                            </div>
                            <div class="form-group"><label>Графіки температури/вологості</label><select id="adv-db-temp"><option value="true">Так</option><option value="false">Ні</option></select></div>
                        </div>
                    </div>

                    <!-- Retention & Reports -->
                    <div class="settings-card">
                        <div class="settings-card-title"><i class="fas fa-history"></i> Логи та Звіти</div>
                        <div class="form-group"><label>Зберігати події (днів)</label><input type="number" id="adv-ret-log"></div>
                        <div class="form-group"><label>Зберігати графіки (днів)</label><input type="number" id="adv-ret-sched"></div>
                        <div class="form-group"><label>Час розсилки звітів (через кому)</label><input type="text" id="adv-notif-times" placeholder="08:00, 20:00"></div>
                    </div>

                </div>

                <div style="margin-top: 30px; display: flex; justify-content: center;">
                    <button class="btn btn-primary" onclick="saveAllSettings()" style="width: 100%; max-width: 500px; padding: 16px; font-size: 1rem;">
                        <i class="fas fa-save"></i> ЗБЕРЕГТИ ВСІ НАЛАШТУВАННЯ
                    </button>
                </div>
            </div>

            <!-- Log Editor -->
            <div class="admin-section full-width">
                <div class="section-header"><i class="fas fa-history"></i> Редактор подій</div>
                
                <div id="log-add-form">
                    <div class="form-group" style="margin-bottom: 0;">
                        <label>Тип події</label>
                        <select id="log-add-event">
                            <option value="up">🟢 Світло з'явилося</option>
                            <option value="down">🔴 Світло зникло</option>
                        </select>
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label>Дата (РРРР-ММ-ДД)</label>
                        <input type="text" id="log-add-date" placeholder="2024-05-20">
                    </div>
                    <div class="form-group" style="margin-bottom: 0;">
                        <label>Час (ГГ:ХХ)</label>
                        <input type="text" id="log-add-time" placeholder="14:30">
                    </div>
                    <button class="btn btn-primary" onclick="addLog()" style="height: 44px;">
                        <i class="fas fa-plus"></i> Додати
                    </button>
                </div>

                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Час</th>
                                <th>Подія</th>
                                <th>Тривалість</th>
                                <th>Дії</th>
                            </tr>
                        </thead>
                        <tbody id="log-table-body">
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
        
        <footer id="footer-info" style="margin-top: 30px; text-align: center; font-size: 0.8rem; color: var(--text-secondary); opacity: 0.7;"></footer>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('t');
        let currentConfig = {};

        async function fetchData() {
            try {
                const response = await fetch(`/api/admin/data?t=${token}`);
                if (!response.ok) throw new Error('Помилка завантаження: ' + response.statusText);
                const data = await response.json();
                
                currentConfig = data.config;
                renderStatus(data.state);
                renderConfig(data.config);
                renderLogs(data.logs);
                
                if (data.version) {
                    document.getElementById('header-version').innerText = data.version;
                }
                
                document.getElementById('footer-info').innerHTML = '&copy; 2026 Weby Homelab &bull; ' + new Date().toLocaleTimeString();
            } catch (err) {
                console.error('Fetch error:', err);
            }
        }

        function renderStatus(state) {
            const statusEl = document.getElementById('sys-status');
            statusEl.innerText = state.status === 'up' ? 'Є СВІТЛО' : 'НЕМАЄ СВІТЛА';
            statusEl.className = 'status-badge ' + (state.status === 'up' ? 'status-up' : 'status-down');
            
            document.getElementById('sys-last-seen').innerText = state.last_seen ? new Date(state.last_seen * 1000).toLocaleString() : '-';
            
            const quietStatus = document.getElementById('sys-quiet-status');
            if (state.quiet_status === 'quiet') { 
                quietStatus.innerText = '🔇 ТИХИЙ РЕЖИМ'; 
                quietStatus.style.color = 'var(--accent-color)'; 
            } else { 
                quietStatus.innerText = '🔔 АКТИВНИЙ'; 
                quietStatus.style.color = 'var(--success-color)'; 
            }

            document.getElementById('sn-status-group').style.display = state.safety_net_pending ? 'block' : 'none';

            const now = Date.now() / 1000;
            const muteGroup = document.getElementById('mute-status-group');
            const btnUnmute = document.getElementById('btn-unmute');
            
            if (state.muted_until && state.muted_until > now) {
                muteGroup.style.display = 'block';
                document.getElementById('sys-mute-until').innerText = new Date(state.muted_until * 1000).toLocaleTimeString();
                btnUnmute.style.display = 'inline-flex';
            } else { 
                muteGroup.style.display = 'none'; 
                btnUnmute.style.display = 'none'; 
            }

            // Sync radio buttons
            const radios = document.getElementsByName('quiet_mode');
            for (let r of radios) { 
                r.checked = (r.value === state.quiet_mode); 
                r.closest('.radio-group').classList.toggle('active', r.checked); 
            }
        }

        function renderConfig(config) {
            if (!config.settings) return;
            
            // Basic Settings
            document.getElementById('cfg-region').value = config.settings.region || '';
            document.getElementById('cfg-groups').value = (config.settings.groups || []).join(', ');
            document.getElementById('cfg-admin-chat').value = config.settings.admin_chat_id || '';
            document.getElementById('cfg-sn-timeout').value = config.settings.safety_net_timeout || 35;
            document.getElementById('cfg-push-interval').value = config.settings.push_interval || 30;
            
            // AQI & Geo
            if (config.sources && config.sources.air_quality) {
                document.getElementById('cfg-aq-station').value = config.sources.air_quality.seb_station || '';
                document.getElementById('cfg-aq-name').value = config.sources.air_quality.location_name || '';
                document.getElementById('cfg-lat').value = config.sources.air_quality.lat || '';
                document.getElementById('cfg-lon').value = config.sources.air_quality.lon || '';
            }

            // Advanced settings
            if (config.advanced) {
                const adv = config.advanced;
                if (adv.monitoring) {
                    document.getElementById('adv-push-min').value = adv.monitoring.push_interval_min || 20;
                    document.getElementById('adv-push-max').value = adv.monitoring.push_interval_max || 60;
                    document.getElementById('adv-sn-delay').value = adv.monitoring.safety_net_delay || 5;
                }
                if (adv.quiet_mode) {
                    document.getElementById('adv-quiet-threshold').value = adv.quiet_mode.stability_threshold_h || 24;
                    document.getElementById('adv-quiet-auto').value = adv.quiet_mode.auto_confirm ? 'true' : 'false';
                }
                if (adv.data_sources) {
                    document.getElementById('adv-ds-priority').value = adv.data_sources.priority || 'yasno';
                    document.getElementById('adv-ds-dedup').value = adv.data_sources.smart_deduplication ? 'true' : 'false';
                    document.getElementById('adv-ds-rollover').value = adv.data_sources.rollover_hour || 6;
                }
                if (adv.retention) {
                    document.getElementById('adv-ret-log').value = adv.retention.event_log_days || 30;
                    document.getElementById('adv-ret-sched').value = adv.retention.schedule_history_days || 14;
                }
                if (adv.notifications) {
                    document.getElementById('adv-notif-times').value = (adv.notifications.report_times || []).join(', ');
                }
                if (adv.dashboard) {
                    document.getElementById('adv-db-aq').value = adv.dashboard.show_aq ? 'true' : 'false';
                    document.getElementById('adv-db-rad').value = adv.dashboard.show_radiation ? 'true' : 'false';
                    document.getElementById('adv-db-temp').value = adv.dashboard.show_temp_graph ? 'true' : 'false';
                }
            }
        }

        function renderLogs(logs) {
            const tbody = document.getElementById('log-table-body');
            tbody.innerHTML = '';
            
            logs.forEach((log, index) => {
                const tr = document.createElement('tr');
                const eventLabel = log.event === 'up' ? 'UP' : 'DOWN';
                const badgeClass = log.event === 'up' ? 'status-up' : 'status-down';
                
                let durationStr = '-';
                if (index < logs.length - 1) {
                    const prevLog = logs[index + 1];
                    const diffSec = log.timestamp - prevLog.timestamp;
                    if (diffSec > 0) {
                        const h = Math.floor(diffSec / 3600);
                        const m = Math.floor((diffSec % 3600) / 60);
                        durationStr = h > 0 ? `${h} год ${m} хв` : `${m} хв`;
                    }
                }
                
                tr.innerHTML = `
                    <td>${log.date_str}</td>
                    <td><span class="status-badge ${badgeClass}">${eventLabel}</span></td>
                    <td style="color: var(--text-secondary); font-size: 0.9em; opacity: 0.8;">${durationStr}</td>
                    <td>
                        <button class="btn btn-secondary btn-sm" onclick="deleteLog(${log.timestamp})" style="padding: 6px 10px;">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                `;
                tbody.appendChild(tr);
            });

            const now = new Date();
            document.getElementById('log-add-date').value = now.toISOString().split('T')[0];
            document.getElementById('log-add-time').value = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
        }

        async function saveQuietMode() {
            const mode = Array.from(document.getElementsByName('quiet_mode')).find(r => r.checked)?.value || 'auto';
            try {
                const response = await fetch(`/api/admin/quiet/mode?t=${token}`, { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({mode}) 
                });
                if (response.ok) {
                    alert('Режим спокою збережено!');
                    fetchData();
                } else {
                    const err = await response.json();
                    alert('Помилка: ' + err.msg);
                }
            } catch (err) { alert('Помилка запиту'); }
        }

        function collectAllConfig() {
            const config = JSON.parse(JSON.stringify(currentConfig));
            if (!config.settings) config.settings = {};
            if (!config.advanced) config.advanced = {};
            if (!config.sources) config.sources = {};
            if (!config.sources.air_quality) config.sources.air_quality = {};

            const getNum = (id, def) => {
                const el = document.getElementById(id);
                if (!el) return def;
                return el.value !== "" ? parseInt(el.value) : def;
            };
            
            const getCoord = (id) => {
                const el = document.getElementById(id);
                if (!el) return "";
                return el.value.trim().replace(',', '.');
            };

            // 1. Monitoring & Network
            config.settings.region = document.getElementById('cfg-region').value;
            config.settings.groups = document.getElementById('cfg-groups').value.split(',').map(s => s.trim()).filter(s => s);
            config.settings.admin_chat_id = document.getElementById('cfg-admin-chat').value;
            config.settings.push_interval = getNum('cfg-push-interval', 30);
            config.settings.safety_net_timeout = getNum('cfg-sn-timeout', 35);
            
            config.advanced.monitoring = {
                push_timeout: getNum('cfg-sn-timeout', 35), // Sync with basic
                push_interval_min: getNum('adv-push-min', 20),
                push_interval_max: getNum('adv-push-max', 60),
                safety_net_delay: getNum('adv-sn-delay', 5)
            };

            // 2. Data Sources & Quiet Mode
            config.advanced.quiet_mode = {
                stability_threshold_h: getNum('adv-quiet-threshold', 24),
                auto_confirm: document.getElementById('adv-quiet-auto').value === 'true'
            };
            config.advanced.data_sources = {
                priority: document.getElementById('adv-ds-priority').value,
                smart_deduplication: document.getElementById('adv-ds-dedup').value === 'true',
                rollover_hour: getNum('adv-ds-rollover', 6)
            };

            // 3. Geo & AQI
            config.sources.air_quality.seb_station = document.getElementById('cfg-aq-station').value.trim();
            config.sources.air_quality.location_name = document.getElementById('cfg-aq-name').value.trim();
            config.sources.air_quality.lat = getCoord('cfg-lat');
            config.sources.air_quality.lon = getCoord('cfg-lon');

            // 4. Retention & Dash
            config.advanced.retention = {
                event_log_days: getNum('adv-ret-log', 30),
                schedule_history_days: getNum('adv-ret-sched', 14)
            };
            config.advanced.notifications = {
                report_times: document.getElementById('adv-notif-times').value.split(',').map(s => s.trim()).filter(s => s)
            };
            config.advanced.dashboard = {
                show_aq: document.getElementById('adv-db-aq').value === 'true',
                show_radiation: document.getElementById('adv-db-rad').value === 'true',
                show_temp_graph: document.getElementById('adv-db-temp').value === 'true'
            };
            
            return config;
        }

        async function saveAllSettings() {
            const config = collectAllConfig();
            try {
                const response = await fetch(`/api/admin/config?t=${token}`, { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify(config) 
                });
                if (response.ok) {
                    alert('Усі системні налаштування успішно збережено!');
                    fetchData();
                } else {
                    const err = await response.json();
                    alert('Помилка збереження: ' + err.msg);
                }
            } catch (err) { alert('Помилка запиту'); }
        }

        async function addLog() {
            const event = document.getElementById('log-add-event').value;
            const dateStr = document.getElementById('log-add-date').value;
            const timeStr = document.getElementById('log-add-time').value;
            const dt = new Date(dateStr + 'T' + timeStr);
            const timestamp = dt.getTime() / 1000;
            if (isNaN(timestamp)) { alert('Некоректний формат дати або часу'); return; }
            
            try {
                const response = await fetch(`/api/admin/logs/add?t=${token}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({event, timestamp})
                });
                if (response.ok) fetchData();
                else alert('Помилка: ' + (await response.json()).msg);
            } catch (err) { alert('Помилка запиту'); }
        }

        async function deleteLog(timestamp) { 
            if (confirm('Видалити цей запис з логів?')) { 
                try {
                    const response = await fetch(`/api/admin/logs/${timestamp}?t=${token}`, { method: 'DELETE' }); 
                    if (response.ok) fetchData();
                    else alert('Помилка: ' + (await response.json()).msg);
                } catch (err) { alert('Помилка запиту'); }
            } 
        }

        async function restartServices() { 
            if (confirm('Перезапустити сервіси? Це короткочасно перерве моніторинг.')) {
                try {
                    const response = await fetch(`/api/admin/service/restart?t=${token}`, { method: 'POST' }); 
                    if (response.ok) alert('Команду на перезапуск надіслано');
                    else alert('Помилка перезапуску');
                } catch(err) { alert('Помилка запиту'); }
            }
        }

        async function safetyNetReact(action) {
            let val = action === 'tech' ? prompt('На скільки хвилин пауза?', '30') : null;
            if (action === 'tech' && val === null) return;
            try {
                const response = await fetch(`/api/admin/safety_net/react?t=${token}`, { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({action, value: val}) 
                });
                if (response.ok) fetchData();
                else alert('Помилка відправки реакції');
            } catch(err) { alert('Помилка запиту'); }
        }

        async function unmuteMonitor() {
            try {
                const response = await fetch(`/api/admin/quiet/mode?t=${token}`, { 
                    method: 'POST', 
                    headers: {'Content-Type': 'application/json'}, 
                    body: JSON.stringify({mode: 'auto', unmute: true}) 
                });
                if (response.ok) fetchData();
                else alert('Помилка зняття паузи');
            } catch(err) { alert('Помилка запиту'); }
        }

        document.querySelectorAll('.radio-group').forEach(group => {
            group.addEventListener('click', () => {
                const radio = group.querySelector('input');
                radio.checked = true;
                document.querySelectorAll('.radio-group').forEach(g => g.classList.remove('active'));
                group.classList.add('active');
            });
        });

        fetchData();
        setInterval(fetchData, 10000);
    </script>
</body>
