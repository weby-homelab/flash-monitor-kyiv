<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flash Monitor Admin</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.1);
            --text-primary: #ffffff;
            --text-secondary: #b0b0b0;
            --accent-color: #3b82f6;
            --danger-color: #ef4444;
            --success-color: #10b981;
            --warning-color: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(59, 130, 246, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(16, 185, 129, 0.05) 0%, transparent 40%);
            color: var(--text-primary);
            min-height: 100vh;
            padding: 20px 10px;
        }

        .admin-container {
            width: 100%;
            max-width: 1000px;
            margin: 0 auto;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 15px;
            gap: 15px;
        }

        header h1 { font-size: 1.4rem; font-weight: 800; letter-spacing: -0.5px; }

        .admin-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .admin-section {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 20px;
        }

        .admin-section.full-width { grid-column: 1 / -1; }

        .section-header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            font-size: 1rem;
            font-weight: 600;
        }

        .section-header i { margin-right: 10px; color: var(--accent-color); width: 20px; text-align: center; }

        .form-group { margin-bottom: 14px; }
        label { display: block; font-size: 0.8rem; color: var(--text-secondary); margin-bottom: 5px; }

        input[type="text"], input[type="number"], select {
            width: 100%;
            background: rgba(255, 255, 255, 0.07);
            border: 1px solid var(--glass-border);
            border-radius: 10px;
            padding: 12px;
            color: var(--text-primary);
            font-size: 0.95rem;
            outline: none;
            transition: all 0.2s;
        }

        input:focus { border-color: var(--accent-color); background: rgba(255, 255, 255, 0.1); }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            gap: 8px;
        }

        .btn-primary { background: var(--accent-color); color: white; }
        .btn-danger { background: var(--danger-color); color: white; }
        .btn-secondary { background: rgba(255, 255, 255, 0.1); color: var(--text-primary); }
        .btn:hover { opacity: 0.9; transform: translateY(-1px); }

        .status-badge {
            padding: 5px 12px;
            border-radius: 100px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-up { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .status-down { background: rgba(239, 68, 68, 0.2); color: #ef4444; }

        @keyframes blink-alarm {
            0% { background: rgba(239, 68, 68, 0.2); }
            50% { background: rgba(239, 68, 68, 0.6); }
            100% { background: rgba(239, 68, 68, 0.2); }
        }

        .alarm-active {
            animation: blink-alarm 1s infinite;
            border: 2px solid var(--danger-color) !important;
        }

        .sn-actions { display: flex; gap: 8px; margin-top: 15px; flex-wrap: wrap; }
        .sn-btn {
            padding: 10px;
            font-size: 0.8rem;
            border-radius: 8px;
            cursor: pointer;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            flex: 1;
            min-width: 100px;
            text-align: center;
        }
        .sn-btn-down { border-color: var(--danger-color); color: var(--danger-color); }
        .sn-btn-tech { border-color: var(--accent-color); color: var(--accent-color); }

        .table-container { overflow-x: auto; margin-top: 10px; border-radius: 12px; }
        table { width: 100%; border-collapse: collapse; min-width: 500px; }
        th { text-align: left; font-size: 0.75rem; color: var(--text-secondary); padding: 12px; border-bottom: 1px solid var(--glass-border); }
        td { padding: 12px; font-size: 0.85rem; border-bottom: 1px solid rgba(255, 255, 255, 0.05); }

        .radio-group {
            display: flex; align-items: center; gap: 12px;
            background: rgba(255, 255, 255, 0.03); padding: 12px;
            border-radius: 12px; cursor: pointer; border: 1px solid transparent;
            margin-bottom: 8px;
        }
        .radio-group.active { border-color: var(--accent-color); background: rgba(59, 130, 246, 0.1); }

        @media (max-width: 767px) {
            header { flex-direction: column; text-align: center; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <header>
            <div>
                <h1>СВІТЛО⚡️ БЕЗПЕКА</h1>
                <p style="color: var(--text-secondary); font-size: 0.8rem;">Панель керування v2.4.0</p>
            </div>
            <button class="btn btn-secondary" onclick="fetchData()">
                <i class="fas fa-sync-alt"></i> Оновити
            </button>
        </header>

        <div class="admin-grid">
            <!-- Status -->
            <div class="admin-section">
                <div class="section-header"><i class="fas fa-server"></i> Статус</div>
                <div class="form-group">
                    <label>Поточний стан</label>
                    <span id="sys-status" class="status-badge">...</span>
                </div>
                <div class="form-group">
                    <label>Останній сигнал</label>
                    <div id="sys-last-seen" style="font-weight: 600;">-</div>
                </div>
                <div class="form-group">
                    <label>Режим сповіщень</label>
                    <div id="sys-quiet-status" style="font-weight: 800; font-size: 0.9rem;">-</div>
                </div>
                <div class="form-group" id="sn-status-group" style="display: none;">
                    <label>Safety Net</label>
                    <div id="sn-badge" class="status-badge" style="text-align: center; padding: 10px;">ВТРАТА ПУША 🚨</div>
                    <div class="sn-actions">
                        <button class="sn-btn sn-btn-down" onclick="safetyNetReact('down')">Зникло</button>
                        <button class="sn-btn sn-btn-tech" onclick="safetyNetReact('tech')">Збій</button>
                        <button class="sn-btn" onclick="safetyNetReact('dontknow')">Не знаю</button>
                    </div>
                </div>
                <div class="form-group" id="mute-status-group" style="display: none;">
                    <label>Пауза до</label>
                    <div id="sys-mute-until" style="color: var(--accent-color); font-weight: 800;">-</div>
                </div>
                <div style="margin-top: 20px; display: flex; gap: 8px;">
                    <button class="btn btn-danger btn-sm" onclick="restartServices()">Перезапуск</button>
                    <button id="btn-unmute" class="btn btn-secondary btn-sm" onclick="unmuteMonitor()" style="display: none;">Увімкнути</button>
                </div>
            </div>

            <!-- Quiet Mode -->
            <div class="admin-section">
                <div class="section-header"><i class="fas fa-volume-mute"></i> Спокій</div>
                <label class="radio-group" id="q-auto"><input type="radio" name="quiet_mode" value="auto"> <div><b>Авто</b><br><small>Тиша без графіків</small></div></label>
                <label class="radio-group" id="q-on"><input type="radio" name="quiet_mode" value="forced_on"> <div><b>Тихо</b><br><small>Без сповіщень</small></div></label>
                <label class="radio-group" id="q-off"><input type="radio" name="quiet_mode" value="forced_off"> <div><b>Активно</b><br><small>Всі сповіщення</small></div></label>
                <button class="btn btn-primary" onclick="saveQuietMode()" style="width: 100%; margin-top: 5px;">Зберегти</button>
            </div>

            <!-- Config -->
            <div class="admin-section full-width">
                <div class="section-header"><i class="fas fa-cog"></i> Налаштування</div>
                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px;">
                    <div class="form-group"><label>Регіон</label><input type="text" id="cfg-region"></div>
                    <div class="form-group"><label>Групи</label><input type="text" id="cfg-groups"></div>
                    <div class="form-group"><label>Admin Chat ID</label><input type="text" id="cfg-admin-chat"></div>
                    <div class="form-group"><label>Пуш (сек)</label><input type="number" id="cfg-push-interval"></div>
                    <div class="form-group"><label>Safety Net (сек)</label><input type="number" id="cfg-sn-timeout"></div>
                    <div class="form-group"><label>Lat</label><input type="text" id="cfg-lat"></div>
                    <div class="form-group"><label>Lon</label><input type="text" id="cfg-lon"></div>
                    <div class="form-group"><label>AQ ID</label><input type="text" id="cfg-aq-station"></div>
                    <div class="form-group"><label>AQ Name</label><input type="text" id="cfg-aq-name"></div>
                </div>
                <button class="btn btn-primary" onclick="saveConfig()" style="margin-top: 10px;">Зберегти налаштування</button>
            </div>

            <!-- Logs -->
            <div class="admin-section full-width">
                <div class="section-header"><i class="fas fa-history"></i> Історія подій (10 останніх)</div>
                <div id="log-add-form" style="margin-bottom: 15px; display: flex; gap: 10px; flex-wrap: wrap; background: rgba(255,255,255,0.03); padding: 15px; border-radius: 12px;">
                    <select id="log-add-event" style="flex: 1;"><option value="up">🟢 З'явилося</option><option value="down">🔴 Зникло</option></select>
                    <input type="text" id="log-add-date" style="flex: 1;">
                    <input type="text" id="log-add-time" style="flex: 1;">
                    <button class="btn btn-primary" onclick="addLog()"><i class="fas fa-plus"></i></button>
                </div>
                <div class="table-container">
                    <table>
                        <thead><tr><th>Час</th><th>Подія</th><th>Timestamp</th><th>Дії</th></tr></thead>
                        <tbody id="log-table-body"></tbody>
                    </table>
                </div>
            </div>
        </div>
        <footer id="footer-info"></footer>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const token = params.get('t');
        let currentConfig = {};

        async function fetchData() {
            try {
                const response = await fetch(`/api/admin/data?t=${token}`);
                const data = await response.json();
                currentConfig = data.config;
                renderStatus(data.state);
                renderConfig(data.config);
                renderLogs(data.logs);
                document.getElementById('footer-info').innerText = `© 2026 Weby Homelab • ${new Date().toLocaleTimeString()}`;
            } catch (err) { console.error(err); }
        }

        function renderStatus(state) {
            const statusEl = document.getElementById('sys-status');
            statusEl.innerText = state.status === 'up' ? 'Є СВІТЛО' : 'НЕМАЄ СВІТЛА';
            statusEl.className = 'status-badge ' + (state.status === 'up' ? 'status-up' : 'status-down');
            document.getElementById('sys-last-seen').innerText = state.last_seen ? new Date(state.last_seen * 1000).toLocaleString() : 'Ніколи';
            
            const quietEl = document.getElementById('sys-quiet-status');
            if (state.quiet_status === 'quiet') {
                quietEl.innerText = '🔇 ТИХИЙ РЕЖИМ';
                quietEl.style.color = 'var(--accent-color)';
            } else {
                quietEl.innerText = '🔔 АКТИВНИЙ';
                quietEl.style.color = 'var(--success-color)';
            }
            
            const snGroup = document.getElementById('sn-status-group');
            if (state.safety_net_pending) {
                snGroup.style.display = 'block';
                document.getElementById('sn-badge').classList.add('alarm-active');
            } else {
                snGroup.style.display = 'none';
            }

            const now = Date.now() / 1000;
            const muteGroup = document.getElementById('mute-status-group');
            if (state.muted_until && state.muted_until > now) {
                muteGroup.style.display = 'block';
                document.getElementById('sys-mute-until').innerText = new Date(state.muted_until * 1000).toLocaleTimeString();
                document.getElementById('btn-unmute').style.display = 'inline-flex';
            } else {
                muteGroup.style.display = 'none';
                document.getElementById('btn-unmute').style.display = 'none';
            }

            const radios = document.getElementsByName('quiet_mode');
            for (let r of radios) {
                r.checked = (r.value === state.quiet_mode);
                r.closest('.radio-group').classList.toggle('active', r.checked);
            }
        }

        function renderConfig(config) {
            if (!config.settings) return;
            document.getElementById('cfg-region').value = config.settings.region || '';
            document.getElementById('cfg-groups').value = (config.settings.groups || []).join(', ');
            document.getElementById('cfg-admin-chat').value = config.settings.admin_chat_id || '';
            document.getElementById('cfg-sn-timeout').value = config.settings.safety_net_timeout || 35;
            document.getElementById('cfg-push-interval').value = config.settings.push_interval || 30;
            if (config.sources?.air_quality) {
                document.getElementById('cfg-aq-station').value = config.sources.air_quality.seb_station || '';
                document.getElementById('cfg-aq-name').value = config.sources.air_quality.location_name || '';
                document.getElementById('cfg-lat').value = config.sources.air_quality.lat || '';
                document.getElementById('cfg-lon').value = config.sources.air_quality.lon || '';
            }
        }

        function renderLogs(logs) {
            const tbody = document.getElementById('log-table-body');
            tbody.innerHTML = logs.map(log => `
                <tr>
                    <td>${log.date_str}</td>
                    <td><span class="status-badge ${log.event === 'up' ? 'status-up' : 'status-down'}">${log.event === 'up' ? 'З\'ЯВИЛОСЯ' : 'ЗНИКЛО'}</span></td>
                    <td style="font-family: monospace; font-size: 0.7rem;">${log.timestamp}</td>
                    <td><button class="btn btn-secondary btn-sm" onclick="deleteLog(${log.timestamp})"><i class="fas fa-trash"></i></button></td>
                </tr>
            `).join('');
            const now = new Date();
            document.getElementById('log-add-date').value = now.toISOString().split('T')[0];
            document.getElementById('log-add-time').value = now.getHours().toString().padStart(2,'0') + ':' + now.getMinutes().toString().padStart(2,'0');
        }

        async function saveQuietMode() {
            const mode = Array.from(document.getElementsByName('quiet_mode')).find(r => r.checked)?.value;
            await fetch(`/api/admin/quiet/mode?t=${token}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({mode}) });
            fetchData();
        }

        async function saveConfig() {
            const config = JSON.parse(JSON.stringify(currentConfig));
            config.settings.region = document.getElementById('cfg-region').value;
            config.settings.groups = document.getElementById('cfg-groups').value.split(',').map(s => s.trim());
            config.settings.admin_chat_id = document.getElementById('cfg-admin-chat').value;
            config.settings.safety_net_timeout = parseInt(document.getElementById('cfg-sn-timeout').value);
            config.settings.push_interval = parseInt(document.getElementById('cfg-push-interval').value);
            if (!config.sources.air_quality) config.sources.air_quality = {};
            config.sources.air_quality.seb_station = document.getElementById('cfg-aq-station').value;
            config.sources.air_quality.location_name = document.getElementById('cfg-aq-name').value;
            config.sources.air_quality.lat = document.getElementById('cfg-lat').value;
            config.sources.air_quality.lon = document.getElementById('cfg-lon').value;
            await fetch(`/api/admin/config?t=${token}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(config) });
            alert('Збережено'); fetchData();
        }

        async function safetyNetReact(action) {
            let value = action === 'tech' ? prompt('Хвилин?', '30') : null;
            if (action === 'tech' && !value) return;
            await fetch(`/api/admin/safety_net/react?t=${token}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({action, value}) });
            fetchData();
        }

        async function unmuteMonitor() {
            await fetch(`/api/admin/quiet/mode?t=${token}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({mode: 'auto', unmute: true}) });
            fetchData();
        }

        async function addLog() {
            const event = document.getElementById('log-add-event').value;
            const ts = new Date(document.getElementById('log-add-date').value + 'T' + document.getElementById('log-add-time').value).getTime() / 1000;
            await fetch(`/api/admin/logs/add?t=${token}`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({event, timestamp: ts}) });
            fetchData();
        }

        async function deleteLog(ts) {
            if (confirm('Видалити?')) {
                await fetch(`/api/admin/logs/${ts}?t=${token}`, { method: 'DELETE' });
                fetchData();
            }
        }

        async function restartServices() {
            if (confirm('Перезапустити?')) await fetch(`/api/admin/service/restart?t=${token}`, { method: 'POST' });
        }

        fetchData();
        setInterval(fetchData, 10000);
        document.querySelectorAll('.radio-group').forEach(g => g.onclick = () => { g.querySelector('input').checked = true; renderStatus({quiet_mode: g.querySelector('input').value}); });
    </script>
</body>
</html>
