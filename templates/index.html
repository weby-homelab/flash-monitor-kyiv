<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, shrink-to-fit=no">
    
    <title>v2.2.8 | СВІТЛО⚡БЕЗПЕКА (Київ)</title>
    
    <meta name="theme-color" content="#050505">
    <link rel="manifest" href="/manifest.json?v=2.2.8">
    <link rel="icon" type="image/png" href="/static/favicon.png?v=2.2.8">
    <link rel="apple-touch-icon" href="/static/icon-512.png?v=2.2.8">
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #050505;
            --card-bg: rgba(25, 25, 30, 0.6);
            --card-border: rgba(255, 255, 255, 0.08);
            --card-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --accent: #a78bfa;
            --success: #34d399;
            --danger: #f87171;
            --warning: #fbbf24;
            --blur: 25px;
            --color-on: #14b8a6;
            --color-off: #f43f5e;
        }
        @media (prefers-color-scheme: light) {
            :root {
                --bg-color: #f3f4f6;
                --card-bg: rgba(255, 255, 255, 0.7);
                --card-border: rgba(0, 0, 0, 0.05);
                --card-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
                --text-primary: #111827;
                --text-secondary: #4b5563;
                --accent: #8b5cf6;
                --success: #059669;
                --danger: #dc2626;
                --color-on: #0f766e;
                --color-off: #be123c;
            }
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
        
        html { 
            width: 100%;
            height: auto;
            min-height: 100%;
            overflow-x: hidden; 
            overflow-y: auto;
            background-color: #050505;
        }
        
        body { 
            background-color: var(--bg-color); 
            color: var(--text-primary); 
            font-family: 'Inter', sans-serif; 
            width: 100%;
            min-height: 100vh;
            margin: 0;
            display: block; 
            padding: env(safe-area-inset-top, 24px) 16px env(safe-area-inset-bottom, 60px); 
            background-attachment: scroll; 
            transition: background-color 0.3s; 
        }
        
        body::before { content: ''; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(circle at 10% 10%, rgba(167, 139, 250, 0.08) 0%, transparent 40%), radial-gradient(circle at 90% 90%, rgba(34, 211, 238, 0.08) 0%, transparent 40%); z-index: -1; }
        
        .container { 
            width: 100%; 
            max-width: 600px; 
            margin: 0 auto;
            position: relative;
        }
        
        header { width: 100%; display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
        .logo { font-size: 1.2rem; font-weight: 800; letter-spacing: -0.03em; color: var(--text-primary); }
        .logo span { color: var(--accent); }

        .bell-btn {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            backdrop-filter: blur(10px);
            transition: all 0.2s;
        }
        .bell-btn.off { opacity: 0.5; }

        .card { 
            background: var(--card-bg); 
            border: 1px solid var(--card-border); 
            border-radius: 28px; 
            padding: 24px; 
            margin-bottom: 16px; 
            backdrop-filter: blur(var(--blur)); 
            -webkit-backdrop-filter: blur(var(--blur)); 
            box-shadow: var(--card-shadow);
            width: 100%;
        }
        
        .status-row { display: flex; align-items: center; gap: 16px; }
        .status-icon { font-size: 2.2rem; }
        .status-title { font-size: 1.5rem; font-weight: 800; margin-bottom: 2px; }
        .status-desc { font-size: 0.95rem; color: var(--text-secondary); line-height: 1.4; }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .grid-item { background: rgba(255,255,255,0.03); padding: 16px; border-radius: 20px; border: 1px solid var(--card-border); }
        @media (prefers-color-scheme: light) { .grid-item { background: rgba(0,0,0,0.03); } }
        .grid-val { font-size: 1.25rem; font-weight: 700; }
        .grid-label { font-size: 0.65rem; color: var(--text-secondary); text-transform: uppercase; font-weight: 600; }
        
        .section-header { margin: 24px 0 12px; font-size: 0.7rem; font-weight: 800; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.15em; display: flex; align-items: center; gap: 12px; }
        .section-header::after { content: ''; height: 1px; flex-grow: 1; background: var(--card-border); }
        
        .chart-wrap { border-radius: 24px; overflow: hidden; border: 1px solid var(--card-border); margin-top: 12px; background: #000; cursor: pointer; }
        .chart-wrap img { width: 100%; height: auto; display: block; }

        /* SCHEDULE STYLES - RESTORED */
        .schedule-text { 
            background: var(--card-bg); 
            border: 1px solid var(--card-border); 
            border-radius: 28px; 
            padding: 24px; 
            font-size: 0.95rem; 
            line-height: 1.7; 
            color: var(--text-primary);
        }
        .schedule-columns { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-top: 12px; }
        .col-header { font-size: 0.75rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 1px solid var(--card-border); }
        .col-header.on { color: var(--color-on); }
        .col-header.off { color: var(--color-off); }
        
        .schedule-date { font-weight: 700; margin-bottom: 16px; font-size: 1rem; }
        .schedule-line { display: flex; align-items: center; margin-bottom: 6px; font-variant-numeric: tabular-nums; }
        .schedule-line.on { color: var(--color-on); }
        .schedule-line.off { color: var(--color-off); }
        .schedule-time { width: 45px; text-align: center; font-weight: 600; }
        .time-sep { width: 15px; text-align: center; opacity: 0.5; }
        .schedule-duration { margin-left: 8px; font-size: 0.8rem; opacity: 0.7; }
        
        .schedule-summary { border-top: 1px dashed var(--card-border); margin-top: 16px; padding-top: 16px; display: flex; gap: 20px; }
        .light-hours { color: var(--color-on); font-weight: 700; }
        .no-light-hours { color: var(--color-off); font-weight: 700; }
        .source-label { font-size: 0.7rem; text-transform: uppercase; opacity: 0.5; margin-top: 8px; display: block; }

        footer { margin-top: 40px; text-align: center; font-size: 0.8rem; color: var(--text-secondary); line-height: 1.6; padding-bottom: 40px; }
        #modal { display: none; position: fixed; z-index: 1000; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); align-items: center; justify-content: center; }
        #modal img { max-width: 95%; max-height: 90vh; border-radius: 12px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="logo">СВІТЛО<span>⚡</span>БЕЗПЕКА</div>
            <div id="bell-btn" class="bell-btn off" onclick="toggleNotifications()">🔕</div>
        </header>
        
        <div id="light-card" class="card"><div class="status-row"><div class="status-icon" id="light-icon">⏳</div><div class="status-info"><div class="status-title" id="light-text">Завантаження</div><div class="status-desc" id="light-event">...</div></div></div></div>
        
        <div id="alert-card" class="card"><div class="status-row"><div class="status-icon" id="alert-icon">🛡️</div><div class="status-info"><div class="status-title" id="alert-val">---</div><div class="status-desc" id="alert-status">...</div></div></div></div>
        <div class="card" style="padding: 0; height: 320px; border: none; background: #000; overflow: hidden;"><iframe id="alert-map" src="https://alerts.in.ua/?minimal=true" width="100%" height="100%" frameborder="0"></iframe></div>
        
        <div class="section-header">Якість повітря</div>
        <div class="card">
            <div style="display: flex; align-items: baseline; gap: 12px; margin-bottom: 24px;"><span id="aqi-num" style="font-size: 3.5rem; font-weight: 800; line-height: 1;">--</span><div><div id="aqi-text" style="font-size: 1.2rem; font-weight: 700;">---</div><div style="font-size: 0.75rem; color: var(--text-secondary); font-weight: 600;">AQI INDEX</div></div></div>
            <div class="grid">
                <div class="grid-item"><div class="grid-val" id="pm25">--</div><div class="grid-label">PM2.5</div></div>
                <div class="grid-item"><div class="grid-val" id="pm10">--</div><div class="grid-label">PM10</div></div>
                <div class="grid-item"><div class="grid-val" id="temp">--</div><div class="grid-label">Темп.</div></div>
                <div class="grid-item"><div class="grid-val" id="hum">--</div><div class="grid-label">Волог.</div></div>
            </div>
        </div>
        
        <div class="section-header">Графік</div>
        <div id="schedule-text" class="schedule-text">...</div>

        <div class="section-header">Аналітика</div>
        <div class="chart-wrap" onclick="zoomImage(this.querySelector('img').src)"><img id="main-chart" src="/static/chart.png"></div>
        <div class="chart-wrap" style="margin-top: 16px;" onclick="zoomImage(this.querySelector('img').src)"><img id="weekly-chart" src="/static/weekly.png"></div>
        
        <footer>
            v2.2.8 | Оновлено: <span id="last-update">--:--:--</span><br>
            © 2026 Weby Homelab
        </footer>
    </div>
    <div id="modal" onclick="this.style.display='none'"><img id="modal-img" src=""></div>
    
    <script>
        let lastLightStatus = null;
        let lastAlertStatus = null;
        let notificationsEnabled = localStorage.getItem('notifications') === 'true';
        const audio = new Audio('https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3');

        function updateBellUI() {
            const btn = document.getElementById('bell-btn');
            if (btn) {
                btn.innerText = notificationsEnabled ? '🔔' : '🔕';
                btn.className = notificationsEnabled ? 'bell-btn' : 'bell-btn off';
            }
        }

        async function toggleNotifications() {
            if (!notificationsEnabled) {
                const permission = await Notification.requestPermission();
                if (permission === 'granted') {
                    notificationsEnabled = true;
                    localStorage.setItem('notifications', 'true');
                }
            } else {
                notificationsEnabled = false;
                localStorage.setItem('notifications', 'false');
            }
            updateBellUI();
        }

        function zoomImage(src) { 
            document.getElementById('modal-img').src = src; 
            document.getElementById('modal').style.display = 'flex'; 
        }
        
        function refreshCharts() {
            const t = Date.now();
            const theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
            const sfx = theme === 'light' ? '_light' : '';
            document.getElementById('main-chart').src = `/static/chart${sfx}.png?t=${t}`;
            document.getElementById('weekly-chart').src = `/static/weekly${sfx}.png?t=${t}`;
        }

        function update() {
            fetch('/api/status').then(r => r.json()).then(data => {
                const lCard = document.getElementById('light-card');
                if (lCard) {
                    lCard.className = data.light === 'on' ? 'card status-on' : 'card status-off';
                    document.getElementById('light-icon').innerText = data.light === 'on' ? '💡' : '✖️';
                    document.getElementById('light-text').innerText = data.light === 'on' ? "Світло Є!" : "Світло зникло!";
                }
                document.getElementById('light-event').innerHTML = data.light_event;
                
                if (lastLightStatus && data.light !== lastLightStatus) {
                    if (notificationsEnabled) audio.play().catch(e=>{});
                    refreshCharts();
                }
                lastLightStatus = data.light;

                const aCard = document.getElementById('alert-card');
                const isA = !!data.alert.city;
                if (aCard) {
                    aCard.className = isA ? 'card alert-active' : 'card';
                    document.getElementById('alert-icon').innerText = isA ? '🚨' : '🛡️';
                    document.getElementById('alert-val').innerText = isA ? 'ТРИВОГА' : 'СПОКІЙНО';
                    document.getElementById('alert-status').innerText = isA ? 'Київ. В УКРИТТЯ!' : 'Київ. Спокійно';
                }
                
                document.getElementById('aqi-num').innerText = data.aqi.aqi;
                document.getElementById('aqi-text').innerText = data.aqi.text;
                document.getElementById('aqi-num').style.color = (data.aqi.aqi > 100) ? 'var(--danger)' : (data.aqi.aqi > 50) ? 'var(--warning)' : 'var(--success)';
                document.getElementById('pm25').innerText = data.aqi.pm25;
                document.getElementById('pm10').innerText = data.aqi.pm10;
                document.getElementById('temp').innerText = data.aqi.temp + '°C';
                document.getElementById('hum').innerText = data.aqi.hum + '%';
                
                document.getElementById('schedule-text').innerHTML = data.schedule_text;
                document.getElementById('last-update').innerText = data.timestamp;
            });
        }

        updateBellUI();
        setInterval(update, 30000); 
        update();
        if ('serviceWorker' in navigator) navigator.serviceWorker.register('/service-worker.js?v=2.2.8');
    </script>
</body>
</html>
